<!doctype html>
<html lang="hi">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>समीक्षाएं | सुमित कुमार — ग्राम प्रधान अभ्यर्थी</title>
    <link rel="icon" href="./mr-image.jpg">
    <meta name="author" content="सुमित कुमार">
    <meta name="description" content="सुमित कुमार — ग्राम पंचायत अभियान के बारे में लोगों की राय।">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#047857' }
                },
                fontFamily: {
                    sans: ['"Noto Sans Devanagari"', 'system-ui']
                }
            }
        }
    </script>
    <script src="js/components.js" defer></script>
    <style>
        body {
            font-family: Noto Sans Devanagari, system-ui, -apple-system, sans-serif
        }

        .mobile-menu {
            transform: translateY(-10px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s ease;
        }

        .mobile-menu.show {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .no-scroll {
            overflow: hidden;
            height: 100vh;
        }
    </style>
</head>

<body class="bg-white text-gray-800 antialiased">

    <site-header class="fixed inset-x-0 top-0 z-50 bg-white shadow-sm transition-all duration-300 ease-in-out">
    </site-header>

    <main class="pt-24 min-h-screen bg-gray-50">

        <!-- Page Header -->
        <section class="bg-white py-8 text-center border-b border-gray-100">
            <h1 class="text-3xl font-bold text-gray-900">गाँव की आवाज़</h1>
            <p class="mt-2 text-gray-600">हमारे समर्थकों और ग्रामीणों के विचार</p>
        </section>

        <!-- Reviews Grid -->
        <section class="py-12 max-w-6xl mx-auto px-6">
            <div id="reviews-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Reviews will be loaded here via JS -->
                <div class="col-span-full text-center py-12 text-gray-500">
                    समीक्षाएं लोड हो रही हैं... <span class="loading-dots">...</span>
                </div>
            </div>
        </section>

        <!-- CTA -->
        <section class="bg-green-700 text-white py-16 text-center">
            <h2 class="text-3xl font-bold mb-4">आप भी अपनी राय साझा करें</h2>
            <p class="mb-6">सुझाव पेटी के माध्यम से आप अपने विचार हम तक पहुँचा सकते हैं।</p>
            <a href="contact.html#complaint-box" class="bg-white text-green-700 px-8 py-3 rounded-lg font-bold">
                राय दें / सुझाव दें
            </a>
        </section>

        <!-- FOOTER -->
        <site-footer></site-footer>

    </main>

    <script>
        // Reviews Logic
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('reviews-grid');

            try {
                const response = await fetch('data/reviews.json');
                if (!response.ok) throw new Error('Data load failed');
                const reviews = await response.json();

                grid.innerHTML = ''; // Clear loading

                reviews.forEach(review => {
                    const card = document.createElement('div');
                    card.className = 'p-6 bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow flex flex-col h-full';

                    // Color mapping for Tailwind classes
                    const colors = {
                        green: 'text-green-700 bg-green-200',
                        blue: 'text-blue-700 bg-blue-200',
                        pink: 'text-pink-700 bg-pink-200',
                        purple: 'text-purple-700 bg-purple-200',
                        yellow: 'text-yellow-700 bg-yellow-200',
                        indigo: 'text-indigo-700 bg-indigo-200'
                    };
                    const colorClass = colors[review.avatar_color] || colors.green;

                    card.innerHTML = `
                   <div class="text-4xl text-gray-200 mb-4 font-serif">❝</div>
                   <p class="text-gray-700 italic mb-6 relative z-10 flex-grow">
                     "${review.text}"
                   </p>
                   <div class="flex items-center gap-3 mt-auto">
                     <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold ${colorClass}">
                       ${review.avatar_char}
                     </div>
                     <div>
                       <h4 class="font-bold text-gray-900">${review.name}</h4>
                       <p class="text-xs text-gray-500">${review.role}</p>
                     </div>
                   </div>
                `;
                    grid.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                grid.innerHTML = '<div class="col-span-full text-center text-red-500">समीक्षाएं लोड करने में समस्या हुई। कृपया पुनः प्रयास करें।</div>';
            }
        });

    </script>

    <!-- ================= FLOATING ACTION BUTTONS ================= -->
    <floating-buttons></floating-buttons>

</body>

</html>
